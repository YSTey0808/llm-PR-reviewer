name: "Intent Gate"
description: "LLM malicious-intent gate for PR diffs."
inputs:
  model:
    default: "qwen2.5-coder:3b"
  block-threshold:
    default: "7"
  review-threshold:
    default: "4"
runs:
  using: "composite"
  steps:
    - name: Ensure Ollama and model
      shell: bash
      run: |
        curl -sf http://localhost:11434/api/tags >/dev/null || (ollama serve & sleep 3)
        ollama list | grep -q "${{ inputs.model }}" || ollama pull "${{ inputs.model }}"
    - name: Run intent gate
      shell: bash
      env:
        MODEL: ${{ inputs.model }}
        BLOCK_THRESHOLD: ${{ inputs.block-threshold }}
        REVIEW_THRESHOLD: ${{ inputs.review-threshold }}
      run: |
        export PROMPT_FILE="$GITHUB_ACTION_PATH/prompts/intent.md"
        BASE="${GITHUB_BASE_REF}"
        python3 "$GITHUB_ACTION_PATH/detector/scan.py" --git-base "origin/$BASE"
