# This repo's own CI: runs the Intent Gate action defined in ./action.yml
# against PRs to this repo (dogfooding). Consumers of the action should copy
# this job and replace `uses: ./` with `uses: YSTey0808/llm-PR-reviewer@main`.
name: "Detector"

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  scan:
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: read
      checks: write
      pull-requests: write   # needed for the sticky PR comment
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Intent gate
        uses: ./
        with:
          model: qwen2.5-coder:3b
          block-threshold: "7"
          review-threshold: "4"
