# ============================================================
# THIS FILE GOES IN:  llm-PR-reviewer/action.yml   (repo ROOT)
# TYPE: ACTION (has `inputs:` and `runs: using: composite`)
# Do NOT put `on:` or `jobs:` in this file.
#
# NOTE for consumers: the sticky PR comment needs the calling job to grant
#   permissions:
#     pull-requests: write
# Set input `comment: "false"` to disable it.
#
# scan.py writes the rendered review to comment.md; the comment step below
# posts/updates it with the gh CLI, keyed off the hidden HTML marker on the
# comment's first line so re-runs edit the same comment.
# ============================================================
name: "Intent Gate"
description: "LLM-based malicious-intent gate for PR diffs, self-hosted via local Ollama."
branding:
  icon: "shield"
  color: "purple"

inputs:
  model:
    description: "Ollama model tag"
    required: false
    default: "qwen2.5-coder:3b"
  block-threshold:
    description: "Risk score (0-100) at/above which the verdict is block (fails the check)"
    required: false
    default: "70"
  review-threshold:
    description: "Risk score (0-100) at/above which the verdict is review"
    required: false
    default: "40"
  comment:
    description: "Post/update a sticky PR comment with the review"
    required: false
    default: "true"
  fail-closed:
    description: "On a scan error, block instead of failing open to review. Set true for protected/release branches; leave false on feature branches for dev experience."
    required: false
    default: "false"
  request-timeout:
    description: "Per-request read timeout in seconds for each Ollama call. Raise on slow/CPU-only runners."
    required: false
    default: "180"
  num-ctx:
    description: "Ollama context window (tokens). Larger handles bigger diffs but uses more RAM and is slower; lower it on CPU-only runners. Must match between warm-up and scan."
    required: false
    default: "4096"

runs:
  using: "composite"
  steps:
    - name: Ensure Ollama and model are ready
      shell: bash
      run: |
        # Ollama runs as a persistent systemd service on the runner. Do NOT start
        # our own — `ollama serve &` dies when this step ends (connection-refused,
        # Errno 111, mid-scan). Just wait for the existing service to be ready.
        for i in $(seq 1 15); do curl -sf localhost:11434/api/tags >/dev/null && break; sleep 2; done
        curl -sf localhost:11434/api/tags >/dev/null || { echo "Ollama not up on :11434"; exit 1; }
        if ! ollama list | grep -q "${{ inputs.model }}"; then
          ollama pull "${{ inputs.model }}"
        fi
        # Warm the model into memory here — a cold start (loading weights +
        # allocating the num_ctx KV cache) can take a while on the first call.
        # Paying that cost in this untimed setup step keeps it out of scan.py's
        # per-request timeout. keep_alive holds the model loaded for the scan.
        # CRITICAL: warm with the SAME num_ctx scan.py uses — Ollama keys a
        # loaded model by its options, so a mismatched context forces a full
        # reload inside the timed scan call, wasting the warm-up.
        echo "Warming ${{ inputs.model }} at num_ctx=${{ inputs.num-ctx }} (first load can take a while)..."
        curl -sf http://localhost:11434/api/generate \
          -d "{\"model\":\"${{ inputs.model }}\",\"prompt\":\"ok\",\"stream\":false,\"keep_alive\":\"30m\",\"options\":{\"num_ctx\":${{ inputs.num-ctx }}}}" \
          >/dev/null || echo "warm-up call failed; scan will cold-start"

    - name: Run intent gate
      shell: bash
      env:
        MODEL: ${{ inputs.model }}
        BLOCK_THRESHOLD: ${{ inputs.block-threshold }}
        REVIEW_THRESHOLD: ${{ inputs.review-threshold }}
        FAIL_CLOSED: ${{ inputs.fail-closed }}
        REQUEST_TIMEOUT: ${{ inputs.request-timeout }}
        NUM_CTX: ${{ inputs.num-ctx }}
        # Context values are read into env vars here (the safe place for
        # ${{ github.* }} in a composite action) and used from the script below,
        # never interpolated directly into the run: block.
        EVENT_NAME: ${{ github.event_name }}
        EVENT_BEFORE: ${{ github.event.before }}
      run: |
        # scan.py + prompts come from THIS tool repo via $GITHUB_ACTION_PATH.
        # The diff is taken from the CONSUMER repo (the current working directory).
        #
        # Choose the base to diff HEAD against by trigger type:
        #   - pull_request: the PR's base branch (origin/<base_ref>). $GITHUB_BASE_REF
        #     is only populated for pull_request events.
        #   - push (e.g. a merge landing on main): the commit BEFORE this push
        #     (github.event.before). On a brand-new branch that SHA is all-zeros,
        #     so fall back to HEAD's parent (fetch-depth: 0 makes it available).
        # scan.py diffs `<base>...HEAD`, so on a push `before...HEAD` is exactly
        # the changes the push introduced.
        #
        # `shell: bash` enables pipefail, so a 'block' (exit 1) still fails this
        # step through the tee. tee keeps the result JSON visible in the step log
        # while intent-gate-result.json stays available for tooling. scan.py also
        # writes comment.md (the rendered markdown) into the working directory.
        export PROMPT_FILE="$GITHUB_ACTION_PATH/prompts/intent.md"
        if [ "$EVENT_NAME" = "pull_request" ]; then
          BASE="origin/$GITHUB_BASE_REF"
        else
          BASE="$EVENT_BEFORE"
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="$(git rev-parse HEAD^ 2>/dev/null || echo HEAD)"
          fi
        fi
        echo "Diffing HEAD against base: $BASE (event=$EVENT_NAME)"
        python3 "$GITHUB_ACTION_PATH/detector/scan.py" --git-base "$BASE" --verbose | tee intent-gate-result.json

    - name: Post sticky PR comment
      if: ${{ always() && github.event_name == 'pull_request' && inputs.comment == 'true' }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        PR: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
      run: |
        # Sticky comment: find a previous comment whose body starts with the
        # hidden marker (written by scan.py as comment.md's first line) and
        # PATCH it; otherwise create a new one.
        if [ ! -f comment.md ]; then
          echo "no comment.md produced; skipping PR comment"
          exit 0
        fi
        marker='<!-- intent-gate-comment -->'
        prev=$(gh api "repos/$REPO/issues/$PR/comments" --paginate \
               --jq ".[] | select(.body | startswith(\"$marker\")) | .id" | head -n1)
        if [ -n "$prev" ]; then
          gh api -X PATCH "repos/$REPO/issues/comments/$prev" -F body=@comment.md >/dev/null
          echo "updated existing sticky comment $prev"
        else
          gh api "repos/$REPO/issues/$PR/comments" -F body=@comment.md >/dev/null
          echo "created new sticky comment"
        fi
