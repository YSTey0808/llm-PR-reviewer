# ============================================================
# THIS FILE GOES IN:  llm-PR-reviewer/action.yml   (repo ROOT)
# TYPE: ACTION (has `inputs:` and `runs: using: composite`)
# Do NOT put `on:` or `jobs:` in this file.
#
# NOTE for consumers: the sticky PR comment needs the calling job to grant
#   permissions:
#     pull-requests: write
# Set input `comment: "false"` to disable it.
# ============================================================
name: "Intent Gate"
description: "LLM-based malicious-intent gate for PR diffs, self-hosted via local Ollama."
branding:
  icon: "shield"
  color: "purple"

inputs:
  model:
    description: "Ollama model tag"
    required: false
    default: "qwen2.5-coder:3b"
  block-threshold:
    description: "Score at/above which the verdict is block (fails the check)"
    required: false
    default: "7"
  review-threshold:
    description: "Score at/above which the verdict is review"
    required: false
    default: "4"
  comment:
    description: "Post/update a sticky PR comment with the summary and findings"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Ensure Ollama and model are ready
      shell: bash
      run: |
        curl -sf http://localhost:11434/api/tags >/dev/null || (ollama serve & sleep 3)
        if ! ollama list | grep -q "${{ inputs.model }}"; then
          ollama pull "${{ inputs.model }}"
        fi

    - name: Run intent gate
      shell: bash
      env:
        MODEL: ${{ inputs.model }}
        BLOCK_THRESHOLD: ${{ inputs.block-threshold }}
        REVIEW_THRESHOLD: ${{ inputs.review-threshold }}
      run: |
        # scan.py + prompts come from THIS tool repo via $GITHUB_ACTION_PATH.
        # The diff is taken from the CONSUMER repo (the current working directory).
        # NOTE: use $GITHUB_BASE_REF (bash), NOT ${{ github.base_ref }} — the latter
        # is not allowed inside an action file and was the cause of earlier errors.
        #
        # `shell: bash` enables pipefail, so a 'block' (exit 1) still fails this
        # step through the tee. tee keeps the ::error/::warning annotation lines
        # on the step's stdout (inline PR annotations) while intent-gate-result.json
        # feeds the comment step below.
        export PROMPT_FILE="$GITHUB_ACTION_PATH/prompts/intent.md"
        export SUMMARY_PROMPT_FILE="$GITHUB_ACTION_PATH/prompts/summary.md"
        python3 "$GITHUB_ACTION_PATH/detector/scan.py" --git-base "origin/$GITHUB_BASE_REF" --verbose | tee intent-gate-result.json

    - name: Post sticky PR comment (summary + verdict)
      if: ${{ always() && github.event_name == 'pull_request' && inputs.comment == 'true' }}
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const marker = '<!-- intent-gate-comment -->';
          let out;
          try {
            const raw = fs.readFileSync('intent-gate-result.json', 'utf8');
            // Drop the ::error/::warning annotation lines that follow the JSON.
            const json = raw.split('\n').filter(l => !l.startsWith('::')).join('\n');
            out = JSON.parse(json);
          } catch (e) {
            core.warning('intent gate produced no parseable result file: ' + e.message);
            return;
          }
          const icon = { pass: '✅', review: '⚠️', block: '⛔' }[out.verdict] || '❓';
          let body = `${marker}\n## ${icon} Intent gate: ${String(out.verdict).toUpperCase()} (score ${out.score})\n`;
          if (out.summary) {
            body += `\n**What this PR does:** ${out.summary}\n`;
          }
          const findings = out.findings || [];
          if (findings.length) {
            body += '\n| File | Line | Type | Confidence | Rationale |\n|---|---|---|---|---|\n';
            for (const f of findings) {
              const rat = String(f.rationale || '').replace(/\|/g, '\\|');
              body += `| \`${f.file}\` | ${f.line ?? ''} | ${f.type} | ${f.confidence} | ${rat} |\n`;
            }
          } else {
            body += '\nNo findings.\n';
          }
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            per_page: 100,
          });
          const prev = comments.find(c => c.body && c.body.startsWith(marker));
          if (prev) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: prev.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }
