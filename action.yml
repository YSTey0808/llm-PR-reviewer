# ============================================================
# THIS FILE GOES IN:  llm-PR-reviewer/action.yml   (repo ROOT)
# TYPE: ACTION (has `inputs:` and `runs: using: composite`)
# Do NOT put `on:` or `jobs:` in this file.
#
# NOTE for consumers: the sticky PR comment needs the calling job to grant
#   permissions:
#     pull-requests: write
# Set input `comment: "false"` to disable it.
#
# scan.py writes the rendered review to comment.md; the comment step below
# posts/updates it with the gh CLI, keyed off the hidden HTML marker on the
# comment's first line so re-runs edit the same comment.
# ============================================================
name: "Intent Gate"
description: "LLM-based malicious-intent gate for PR diffs, self-hosted via local Ollama."
branding:
  icon: "shield"
  color: "purple"

inputs:
  model:
    description: "Ollama model tag"
    required: false
    default: "qwen2.5-coder:3b"
  block-threshold:
    description: "Risk score (0-100) at/above which the verdict is block (fails the check)"
    required: false
    default: "70"
  review-threshold:
    description: "Risk score (0-100) at/above which the verdict is review"
    required: false
    default: "40"
  comment:
    description: "Post/update a sticky PR comment with the review"
    required: false
    default: "true"
  fail-closed:
    description: "On a scan error, block instead of failing open to review. Set true for protected/release branches; leave false on feature branches for dev experience."
    required: false
    default: "false"
  request-timeout:
    description: "Per-request read timeout in seconds for each Ollama call. Raise on slow/CPU-only runners."
    required: false
    default: "600"
  num-ctx:
    description: "Ollama context window (tokens). Must be large enough to hold the system prompt (~1.5k tok) + one max-chars chunk (~max-chars/4 tok) + 512 output tokens, or Ollama silently clips the prompt and the reply fails to parse. The 8192 default fits the 16000 max-chars budget; raise both together for bigger chunks, lower on CPU-only runners. Must match between warm-up and scan."
    required: false
    default: "8192"
  max-chars:
    description: "Per-chunk character budget: the most diff sent to the model in ONE call. A large diff is split on file boundaries and packed into chunks under this. Keep it consistent with num-ctx (roughly num-ctx*4 minus prompt/output headroom)."
    required: false
    default: "16000"
  max-chunks:
    description: "Hard cap on model calls per scan. Files that don't fit within this many chunks are left unscanned and floor the verdict to review. Bounds total wall-clock."
    required: false
    default: "8"

runs:
  using: "composite"
  steps:
    - name: Ensure Ollama and model are ready
      shell: bash
      run: |
        # Ollama runs as a persistent systemd service on the runner. Do NOT start
        # our own — `ollama serve &` dies when this step ends (connection-refused,
        # Errno 111, mid-scan). Just wait for the existing service to be ready.
        for i in $(seq 1 15); do curl -sf localhost:11434/api/tags >/dev/null && break; sleep 2; done
        curl -sf localhost:11434/api/tags >/dev/null || { echo "Ollama not up on :11434"; exit 1; }
        if ! ollama list | grep -q "${{ inputs.model }}"; then
          ollama pull "${{ inputs.model }}"
        fi
        # Warm the model into memory here — a cold start (loading weights +
        # allocating the num_ctx KV cache) can take a while on the first call.
        # Paying that cost in this untimed setup step keeps it out of scan.py's
        # per-request timeout. keep_alive holds the model loaded for the scan.
        # CRITICAL: warm with the SAME num_ctx scan.py uses — Ollama keys a
        # loaded model by its options, so a mismatched context forces a full
        # reload inside the timed scan call, wasting the warm-up.
        echo "Warming ${{ inputs.model }} at num_ctx=${{ inputs.num-ctx }} (first load can take a while)..."
        curl -sf http://localhost:11434/api/generate \
          -d "{\"model\":\"${{ inputs.model }}\",\"prompt\":\"ok\",\"stream\":false,\"keep_alive\":\"30m\",\"options\":{\"num_ctx\":${{ inputs.num-ctx }}}}" \
          >/dev/null || echo "warm-up call failed; scan will cold-start"

    - name: Run intent gate
      shell: bash
      env:
        MODEL: ${{ inputs.model }}
        BLOCK_THRESHOLD: ${{ inputs.block-threshold }}
        REVIEW_THRESHOLD: ${{ inputs.review-threshold }}
        FAIL_CLOSED: ${{ inputs.fail-closed }}
        REQUEST_TIMEOUT: ${{ inputs.request-timeout }}
        NUM_CTX: ${{ inputs.num-ctx }}
        MAX_CHARS: ${{ inputs.max-chars }}
        MAX_CHUNKS: ${{ inputs.max-chunks }}
        # Context values are read into env vars here (the safe place for
        # ${{ github.* }} in a composite action) and used from the script below,
        # never interpolated directly into the run: block.
        EVENT_NAME: ${{ github.event_name }}
        EVENT_BEFORE: ${{ github.event.before }}
        # PR base tip SHA — an ancestor of the checked-out merge commit, so it is
        # always present under fetch-depth: 0 (no remote-tracking-name lookup needed).
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
      run: |
        # scan.py + prompts come from THIS tool repo via $GITHUB_ACTION_PATH.
        # The diff is taken from the CONSUMER repo (the current working directory).
        #
        # Choose the base to diff HEAD against by trigger type:
        #   - pull_request: the PR's base branch (origin/<base_ref>). $GITHUB_BASE_REF
        #     is only populated for pull_request events.
        #   - push (e.g. a merge landing on main): the commit BEFORE this push
        #     (github.event.before). On a brand-new branch that SHA is all-zeros,
        #     so fall back to HEAD's parent (fetch-depth: 0 makes it available).
        # scan.py diffs `<base>...HEAD`, so on a push `before...HEAD` is exactly
        # the changes the push introduced.
        #
        # `shell: bash` enables pipefail, so a 'block' (exit 1) still fails this
        # step through the tee. tee keeps the result JSON visible in the step log
        # while intent-gate-result.json stays available for tooling. scan.py also
        # writes comment.md (the rendered markdown) into the working directory.
        export PROMPT_FILE="$GITHUB_ACTION_PATH/prompts/intent.md"
        if [ "$EVENT_NAME" = "pull_request" ]; then
          BASE="${PR_BASE_SHA:-origin/$GITHUB_BASE_REF}"
        else
          BASE="$EVENT_BEFORE"
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="$(git rev-parse HEAD^ 2>/dev/null || echo HEAD)"
          fi
        fi
        echo "Diffing HEAD against base: $BASE (event=$EVENT_NAME)"
        python3 "$GITHUB_ACTION_PATH/detector/scan.py" --git-base "$BASE" --verbose | tee intent-gate-result.json

    - name: Post sticky PR comment
      if: ${{ always() && github.event_name == 'pull_request' && inputs.comment == 'true' }}
      # FAIL-OPEN FOR THE COMMENT ONLY: a broken comment must never fail the job.
      # The pass/fail verdict is enforced entirely by the separate "Run intent gate"
      # step (scan.py exits 1 on 'block'), so continue-on-error here keeps a
      # malicious PR failing while ensuring a comment glitch can't block a clean one.
      continue-on-error: true
      shell: bash
      env:
        # HTTP via curl to github.api_url (NOT `gh`): on a self-hosted GHES runner
        # `gh` may be absent, and even when present it defaults to api.github.com
        # unless GH_HOST is set — so a GHES token 404s and no comment posts. curl
        # and python3 are both already used on this runner (setup step / the gate),
        # and github.api_url resolves to the correct GHES API host. python3 (stdlib)
        # does the JSON so we depend on neither `gh` nor `jq`.
        # ${{ github.* }} is read into env here (the safe place in a composite
        # action) and used from the script below, never interpolated into run:.
        API_URL: ${{ github.api_url }}
        GH_TOKEN: ${{ github.token }}
        PR: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
      run: |
        # Never let a comment failure fail the step (belt with continue-on-error).
        set +e
        if [ ! -f comment.md ]; then
          echo "no comment.md produced; skipping PR comment"
          exit 0
        fi
        echo "Posting PR comment via $API_URL (repo=$REPO pr=$PR)"
        marker='<!-- intent-gate-comment -->'
        auth="Authorization: token $GH_TOKEN"
        accept="Accept: application/vnd.github+json"
        ctype="Content-Type: application/json"

        # Build the JSON request body from comment.md, truncating to GitHub's
        # 65536-char comment cap. Keep the HEAD (the marker on line 1 + verdict +
        # counts) and cut the tail, so sticky-matching on the marker still works.
        python3 - <<'PY'
        import json
        body = open("comment.md", encoding="utf-8").read()
        CAP = 65000                              # headroom under GitHub's 65536
        if len(body) > CAP:
            body = body[:CAP] + "\n\n_…comment truncated (exceeded GitHub's size limit)._\n"
        json.dump({"body": body}, open("payload.json", "w", encoding="utf-8"))
        PY

        # Find an existing sticky comment: page through issue comments (curl to
        # a file) and let python3 (stdlib json) return the id of the first whose
        # body starts with the marker — no jq. Stop at the first short page. The
        # heredoc body is at the run-block base indent so python sees it at col 0.
        prev=""
        page=1
        while [ -z "$prev" ]; do
          curl -sf -H "$auth" -H "$accept" \
            "$API_URL/repos/$REPO/issues/$PR/comments?per_page=100&page=$page" \
            > comments.json || break
          out=$(MARKER="$marker" python3 - <<'PY'
        import json, os
        try:
            cs = json.load(open("comments.json", encoding="utf-8"))
        except Exception:
            cs = []
        m = os.environ["MARKER"]
        cid = next((str(c["id"]) for c in cs if (c.get("body") or "").startswith(m)), "")
        print(cid)
        print(len(cs))
        PY
        )
          prev=$(printf '%s\n' "$out" | sed -n 1p)
          count=$(printf '%s\n' "$out" | sed -n 2p)
          [ -n "$prev" ] && break
          [ "${count:-0}" -lt 100 ] && break     # last page reached, marker not found
          page=$((page + 1))
        done

        if [ -n "$prev" ]; then
          curl -sf -X PATCH -H "$auth" -H "$accept" -H "$ctype" \
            --data-binary @payload.json \
            "$API_URL/repos/$REPO/issues/comments/$prev" >/dev/null \
            && echo "updated sticky comment $prev" \
            || echo "PATCH comment failed (non-fatal)"
        else
          curl -sf -X POST -H "$auth" -H "$accept" -H "$ctype" \
            --data-binary @payload.json \
            "$API_URL/repos/$REPO/issues/$PR/comments" >/dev/null \
            && echo "created sticky comment" \
            || echo "POST comment failed (non-fatal)"
        fi
