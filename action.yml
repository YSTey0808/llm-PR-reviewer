# ============================================================
# THIS FILE GOES IN:  llm-PR-reviewer/action.yml   (repo ROOT)
# TYPE: ACTION (has `inputs:` and `runs: using: composite`)
# Do NOT put `on:` or `jobs:` in this file.
# ============================================================
name: "Intent Gate"
description: "LLM-based malicious-intent gate for PR diffs, self-hosted via local Ollama."
branding:
  icon: "shield"
  color: "purple"

inputs:
  model:
    description: "Ollama model tag"
    required: false
    default: "qwen2.5-coder:3b"
  block-threshold:
    description: "Score at/above which the verdict is block (fails the check)"
    required: false
    default: "7"
  review-threshold:
    description: "Score at/above which the verdict is review"
    required: false
    default: "4"

runs:
  using: "composite"
  steps:
    - name: Ensure Ollama and model are ready
      shell: bash
      run: |
        curl -sf http://localhost:11434/api/tags >/dev/null || (ollama serve & sleep 3)
        if ! ollama list | grep -q "${{ inputs.model }}"; then
          ollama pull "${{ inputs.model }}"
        fi

    - name: Run intent gate
      shell: bash
      env:
        MODEL: ${{ inputs.model }}
        BLOCK_THRESHOLD: ${{ inputs.block-threshold }}
        REVIEW_THRESHOLD: ${{ inputs.review-threshold }}
      run: |
        # scan.py + prompt come from THIS tool repo via $GITHUB_ACTION_PATH.
        # The diff is taken from the CONSUMER repo (the current working directory).
        # NOTE: use $GITHUB_BASE_REF (bash), NOT ${{ github.base_ref }} — the latter
        # is not allowed inside an action file and was the cause of earlier errors.
        export PROMPT_FILE="$GITHUB_ACTION_PATH/prompts/intent.md"
        python3 "$GITHUB_ACTION_PATH/detector/scan.py" --git-base "origin/$GITHUB_BASE_REF"
